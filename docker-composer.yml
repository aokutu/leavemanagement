version: '3.8'

services:
  laravel-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-json-app
    ports:
      - "8080:80"
    volumes:
      # Mount your project files for development
      - ./:/var/www/html
      # Ensure storage and cache directories persist
      - laravel-storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
    networks:
      - laravel-network

volumes:
  laravel-storage:

networks:
  laravel-network:
    driver: bridge